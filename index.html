<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111B21" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SegVision" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <title>SegVision</title>
</head>
<body>

<!-- Update banner -->
<div class="update-banner" id="updateBanner">
  <div class="update-icon">🔄</div>
  <div class="update-text">
    <strong>Update Available</strong>
    <span>New version ready to install</span>
  </div>
  <button class="update-btn" id="updateBtn">Update</button>
  <button class="update-dismiss" id="updateDismiss" title="Dismiss">✕</button>
</div>

<!-- Header -->
<header>
  <div class="logo-dot" id="logoDot">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 18h8"/><path d="M3 22h18"/>
      <path d="M14 22a7 7 0 1 0 0-14h-1"/>
      <path d="M9 14h2"/>
      <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/>
      <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>SegVision</h1>
    <p>Semantic Segmentation</p>
  </div>
  <div class="status-badge" id="statusBadge">READY</div>
</header>

<!-- Main -->
<main>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" />
    <span class="upload-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
    </span>
    <h2>Upload an Image</h2>
    <p>Tap to choose or drag &amp; drop<br/>JPG, PNG, WEBP supported</p>
  </div>

  <!-- Original preview -->
  <div class="preview-card" id="originalCard">
    <div class="card-label">
      <span class="dot" style="background:#8696A0"></span>
      ORIGINAL
    </div>
    <img id="originalImg" src="" alt="Original" />
    <button class="change-img-btn" id="changeImgBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      Change Image
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Loading model…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider" id="resultDivider" style="display:none">SEGMENTATION RESULT</div>

  <!-- Segmented result -->
  <div class="preview-card" id="resultCard">
    <div class="card-label">
      <span class="dot" style="background:var(--accent)"></span>
      SEGMENTED
    </div>
    <div class="canvas-box">
      <canvas id="resultCanvas"></canvas>
    </div>
  </div>

  <!-- Analysis -->
  <div class="analysis-panel" id="analysisPanel">
    <div class="analysis-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Detected Objects
    </div>
    <div class="objects-grid" id="objectsGrid"></div>
    <div class="summary-card" id="summaryCard"></div>
  </div>

</main>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn-primary" id="segBtn" disabled>
    <div class="spinner" id="btnSpinner"></div>
    <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <span id="btnLabel">Start Segmentation</span>
  </button>
  <div class="btn-row" id="actionRow" style="display:none">
    <button class="btn-ghost" id="newImageBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      New Image
    </button>
    <button class="btn-primary" id="retryBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
      </svg>
      Re-Segment
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Entry point (ES module) -->
<script type="module" src="js/main.js"></script>

</body>
</html>
