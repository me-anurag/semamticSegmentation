<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111B21" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SegVision" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>SegVision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #111B21;
      --surface:   #1F2C34;
      --card:      #2A3942;
      --accent:    #00A884;
      --accent2:   #25D366;
      --text:      #E9EDEF;
      --sub:       #8696A0;
      --border:    #2A3942;
      --radius:    18px;
      --font:      'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow-y: auto;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
    }

    .logo-dot {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,168,132,0.4);
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--sub);
      margin-top: 1px;
    }

    .status-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(0,168,132,0.15);
      color: var(--accent);
      border: 1px solid rgba(0,168,132,0.3);
      letter-spacing: 0.5px;
    }

    /* ── Main scroll area ── */
    main {
      flex: 1 0 auto;
      overflow-y: visible;
      padding: 20px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed rgba(0,168,132,0.35);
      border-radius: var(--radius);
      background: rgba(0,168,132,0.04);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,168,132,0.1);
      transform: scale(1.01);
    }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .upload-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 10px rgba(0,168,132,0.5));
    }

    .upload-zone h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .upload-zone p {
      font-size: 13px;
      color: var(--sub);
    }

    /* ── Preview card ── */
    .preview-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      flex-direction: column;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .preview-card.visible { display: flex; }

    .preview-card img {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
      flex-shrink: 0;
    }

    .canvas-box {
      width: 100%;
      background: #000;
      position: relative;
      line-height: 0;
      flex-shrink: 0;
    }

    .canvas-box canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-label {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ── Big action button ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(0,168,132,0.35);
    }

    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:active { background: var(--surface); }

    /* ── Progress ── */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }

    .progress-wrap.visible { display: flex; }

    .progress-label {
      font-size: 13px;
      color: var(--sub);
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-bg {
      height: 4px;
      border-radius: 99px;
      background: var(--card);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sub);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Analysis panel ── */
    .analysis-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .analysis-panel.visible { display: flex; }

    .analysis-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .objects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .obj-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
      cursor: pointer;
    }

    .obj-chip.active {
      background: var(--card);
      border-color: rgba(0,168,132,0.4);
    }

    .obj-color {
      width: 12px; height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .obj-pct {
      margin-left: auto;
      font-size: 11px;
      color: var(--sub);
    }

    /* ── Summary card ── */
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }

    .summary-card strong {
      color: var(--text);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 200;
      white-space: nowrap;
      border: 1px solid var(--border);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Bottom bar ── (defined in UX section above) */

    /* ── Loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }

    /* ── Pulse animation for logo ── */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 16px rgba(0,168,132,0.4); }
      50%        { box-shadow: 0 0 28px rgba(0,168,132,0.7); }
    }

    .logo-dot.processing {
      animation: pulse-glow 1.2s ease-in-out infinite;
    }

    /* ── Fade in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.35s ease both; }

    /* ── Change image banner on original card ── */
    .change-img-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 11px 14px;
      background: rgba(0,168,132,0.07);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.2s;
    }
    .change-img-btn:active { background: rgba(0,168,132,0.15); }

    /* ── Bottom bar two-button layout ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-row .btn-primary { flex: 1; padding: 15px 10px; font-size: 14px; }
    .btn-row .btn-ghost   { flex: 1; }

    .btn-ghost {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px 10px;
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-ghost:active { background: var(--surface); transform: scale(0.97); }

  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-dot" id="logoDot">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>SegVision</h1>
    <p>Semantic Segmentation</p>
  </div>
  <div class="status-badge" id="statusBadge">READY</div>
</header>

<!-- Main -->
<main id="mainScroll">

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" />
    <span class="upload-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
    </span>
    <h2>Upload an Image</h2>
    <p>Tap to choose or drag &amp; drop<br/>JPG, PNG, WEBP supported</p>
  </div>

  <!-- Original preview -->
  <div class="preview-card" id="originalCard">
    <div class="card-label">
      <span class="dot" style="background:#8696A0"></span>
      ORIGINAL
    </div>
    <img id="originalImg" src="" alt="Original" />
    <button class="change-img-btn" id="changeImgBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      Change Image
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Loading model…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Divider between original and result -->
  <div class="divider" id="resultDivider" style="display:none">SEGMENTATION RESULT</div>

  <!-- Segmented result -->
  <div class="preview-card" id="resultCard">
    <div class="card-label">
      <span class="dot" style="background:var(--accent)"></span>
      SEGMENTED
    </div>
    <div class="canvas-box"><canvas id="resultCanvas"></canvas></div>
  </div>

  <!-- Analysis -->
  <div class="analysis-panel" id="analysisPanel">
    <div class="analysis-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Detected Objects
    </div>
    <div class="objects-grid" id="objectsGrid"></div>
    <div class="summary-card" id="summaryCard"></div>
  </div>

</main>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottomBar">
  <!-- State: no image -->
  <button class="btn-primary" id="segBtn" disabled>
    <div class="spinner" id="btnSpinner"></div>
    <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <span id="btnLabel">Start Segmentation</span>
  </button>
  <!-- State: after result — shown as a row -->
  <div class="btn-row" id="actionRow" style="display:none">
    <button class="btn-ghost" id="newImageBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      New Image
    </button>
    <button class="btn-primary" id="retryBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      Re-Segment
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

];

// ── DOM refs ──
const uploadZone   = document.getElementById('uploadZone');
const fileInput    = document.getElementById('fileInput');
const originalCard = document.getElementById('originalCard');
const originalImg  = document.getElementById('originalImg');
const progressWrap = document.getElementById('progressWrap');
const progressText = document.getElementById('progressText');
const progressPct  = document.getElementById('progressPct');
const progressFill = document.getElementById('progressFill');
const resultDivider= document.getElementById('resultDivider');
const resultCard   = document.getElementById('resultCard');
const resultCanvas = document.getElementById('resultCanvas');
const analysisPanel= document.getElementById('analysisPanel');
const objectsGrid  = document.getElementById('objectsGrid');
const summaryCard  = document.getElementById('summaryCard');
const segBtn       = document.getElementById('segBtn');
const btnLabel     = document.getElementById('btnLabel');
const btnSpinner   = document.getElementById('btnSpinner');
const logoDot      = document.getElementById('logoDot');
const statusBadge  = document.getElementById('statusBadge');
const toastEl      = document.getElementById('toast');
const changeImgBtn = document.getElementById('changeImgBtn');
const actionRow    = document.getElementById('actionRow');
const newImageBtn  = document.getElementById('newImageBtn');
const retryBtn     = document.getElementById('retryBtn');

// ── Utilities ──
function showToast(msg, duration = 2500) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), duration);
}

function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressPct.textContent  = Math.round(pct) + '%';
  progressText.textContent = label;
}

function setStatus(text, color) {
  statusBadge.textContent = text;
  statusBadge.style.background = color ? `rgba(${color},0.15)` : '';
  statusBadge.style.color = color ? `rgb(${color})` : '';
  statusBadge.style.borderColor = color ? `rgba(${color},0.3)` : '';
}

function setBusy(busy) {
  segBtn.disabled = busy;
  btnSpinner.classList.toggle('visible', busy);
  const btnIcon = document.getElementById('btnIcon');
  if (btnIcon) btnIcon.style.display = busy ? 'none' : '';
  btnLabel.style.display = busy ? 'none' : '';
  logoDot.classList.toggle('processing', busy);
}

// ── File handling ──
function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showToast('Please upload an image file');
    return;
  }
  imageFile = file;
  const url = URL.createObjectURL(file);
  originalImg.src = url;
  originalImg.onload = () => {
    createImageBitmap(file).then(bmp => { originalBitmap = bmp; });
  };
  originalCard.classList.add('visible', 'fade-up');
  resultCard.classList.remove('visible');
  resultDivider.style.display = 'none';
  analysisPanel.classList.remove('visible');
  progressWrap.classList.remove('visible');
  segBtn.disabled = false;
  segBtn.style.display = '';
  actionRow.style.display = 'none';
  btnLabel.textContent = 'Start Segmentation';
  const existingIcon = document.getElementById('btnIcon');
  if (existingIcon) {
    existingIcon.innerHTML = `<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>`;
  }
  uploadZone.style.display = 'none';
  showToast('Image loaded ✓');
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Load model ──
async function loadModel() {
  progressWrap.classList.add('visible');
  setStatus('LOADING', '255,160,0');
  setProgress(0, 'Initializing model…');

  try {
    segmenter = await pipeline(
      'image-segmentation',
      'Xenova/segformer-b2-finetuned-ade-512-512',
      {
        progress_callback: (info) => {
          if (info.status === 'progress') {
            const pct = (info.loaded / info.total) * 80;
            setProgress(pct, `Downloading model… ${info.file || ''}`);
          } else if (info.status === 'ready') {
            setProgress(90, 'Model ready');
          }
        }
      }
    );
    modelLoaded = true;
    setProgress(100, 'Model loaded ✓');
    setStatus('MODEL READY', '0,168,132');
    setTimeout(() => progressWrap.classList.remove('visible'), 800);
  } catch (err) {
    setStatus('ERROR', '255,60,60');
    showToast('Failed to load model. Check connection.');
    throw err;
  }
}

// ── Segmentation ──
async function runSegmentation() {
  if (!imageFile) return;

  setBusy(true);
  setStatus('RUNNING', '0,168,132');

  try {
    // Load model first time
    if (!modelLoaded) {
      await loadModel();
    }

    progressWrap.classList.add('visible');
    setProgress(0, 'Analysing image…');

    // Run segmentation
    const imgUrl = URL.createObjectURL(imageFile);
    setProgress(20, 'Running SegFormer…');

    const output = await segmenter(imgUrl, { threshold: 0.5 });

    setProgress(70, 'Rendering masks…');

    // Draw result
    await renderMasks(output);

    setProgress(100, 'Done ✓');
    setTimeout(() => progressWrap.classList.remove('visible'), 600);

    setStatus('DONE', '0,168,132');
    setBusy(false);
    showResultActions();

    // Show analysis
    showAnalysis(output);

    // Show result section
    resultDivider.style.display = '';
    resultCard.classList.add('visible', 'fade-up');
    analysisPanel.classList.add('visible', 'fade-up');

    // Scroll to result
    setTimeout(() => {
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);

    showToast(`Found ${output.length} object class${output.length !== 1 ? 'es' : ''} detected`);

  } catch (err) {
    console.error(err);
    setBusy(false);
    setStatus('ERROR', '255,60,60');
    showToast('Segmentation failed. Try again.');
    progressWrap.classList.remove('visible');
  }
}

// ── Render masks onto canvas ──
async function renderMasks(segments) {
  const img = originalImg;
  const W = img.naturalWidth;
  const H = img.naturalHeight;

  // Match canvas intrinsic size to natural image
  resultCanvas.width  = W;
  resultCanvas.height = H;

  const ctx = resultCanvas.getContext('2d');

  // Draw original image
  ctx.drawImage(img, 0, 0, W, H);

  // Overlay each mask
  for (const seg of segments) {
    const label = seg.label;
    const classIdx = CLASS_NAMES.indexOf(label);
    const color = classIdx >= 0 ? PALETTE[classIdx % PALETTE.length] : [255, 100, 100];
    const [r, g, b] = color;
    const mask = seg.mask;

    // mask is a { data, width, height } object
    const maskData   = mask.data;
    const maskW      = mask.width;
    const maskH      = mask.height;

    // Create an offscreen canvas for the mask
    const offscreen  = new OffscreenCanvas(maskW, maskH);
    const octx       = offscreen.getContext('2d');
    const imgData    = octx.createImageData(maskW, maskH);

    for (let i = 0; i < maskData.length; i++) {
      const v = maskData[i]; // 0–255
      const alpha = v > 128 ? 140 : 0;
      imgData.data[i * 4 + 0] = r;
      imgData.data[i * 4 + 1] = g;
      imgData.data[i * 4 + 2] = b;
      imgData.data[i * 4 + 3] = alpha;
    }

    octx.putImageData(imgData, 0, 0);

    // Composite onto result canvas (scaled to image dims)
    ctx.drawImage(offscreen, 0, 0, W, H);

    // Draw label — find centroid
    const { cx, cy } = getMaskCentroid(maskData, maskW, maskH, W, H);

    ctx.save();
    ctx.font = `bold ${Math.max(11, Math.min(18, W / 30))}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const textW = ctx.measureText(label).width;
    const pad = 5;
    const bh = 20;

    // Badge background
    ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
    roundRect(ctx, cx - textW / 2 - pad, cy - bh / 2, textW + pad * 2, bh, 4);
    ctx.fill();

    // Badge text
    ctx.fillStyle = '#fff';
    ctx.fillText(label, cx, cy);
    ctx.restore();
  }
}

function getMaskCentroid(maskData, maskW, maskH, targetW, targetH) {
  let sumX = 0, sumY = 0, count = 0;
  for (let y = 0; y < maskH; y++) {
    for (let x = 0; x < maskW; x++) {
      if (maskData[y * maskW + x] > 128) {
        sumX += x; sumY += y; count++;
      }
    }
  }
  if (count === 0) return { cx: targetW / 2, cy: targetH / 2 };
  return {
    cx: (sumX / count) * (targetW / maskW),
    cy: (sumY / count) * (targetH / maskH),
  };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Analysis panel ──
function showAnalysis(segments) {
  objectsGrid.innerHTML = '';

  // Sort by mask size (largest first)
  const sorted = [...segments].sort((a, b) => {
    const aCount = a.mask.data.filter(v => v > 128).length;
    const bCount = b.mask.data.filter(v => v > 128).length;
    return bCount - aCount;
  });

  const total = sorted.reduce((s, seg) => s + seg.mask.data.filter(v => v > 128).length, 0);

  for (const seg of sorted) {
    const label    = seg.label;
    const classIdx = CLASS_NAMES.indexOf(label);
    const color    = classIdx >= 0 ? PALETTE[classIdx % PALETTE.length] : [255, 100, 100];
    const [r, g, b]= color;
    const count    = seg.mask.data.filter(v => v > 128).length;
    const pct      = total > 0 ? Math.round((count / total) * 100) : 0;
    const score    = seg.score !== undefined ? Math.round(seg.score * 100) : null;

    const chip = document.createElement('div');
    chip.className = 'obj-chip active';
    chip.innerHTML = `
      <span class="obj-color" style="background:rgb(${r},${g},${b})"></span>
      <span>${label}</span>
      <span class="obj-pct">${pct}%</span>
    `;
    objectsGrid.appendChild(chip);
  }

  const labels = sorted.map(s => s.label);
  const top3   = labels.slice(0, 3).join(', ');
  summaryCard.innerHTML = `
    <strong>${segments.length}</strong> object class${segments.length !== 1 ? 'es' : ''} detected.
    Dominant regions: <strong>${top3 || '—'}</strong>.
    ${segments.length > 3 ? `<br/>Also found: ${labels.slice(3).join(', ')}.` : ''}
  `;
}

// ── Reset to upload state ──
function resetToUpload() {
  imageFile = null;
  originalBitmap = null;
  originalImg.src = '';
  originalCard.classList.remove('visible');
  resultCard.classList.remove('visible');
  resultDivider.style.display = 'none';
  analysisPanel.classList.remove('visible');
  progressWrap.classList.remove('visible');
  uploadZone.style.display = '';
  segBtn.disabled = true;
  segBtn.style.display = '';
  actionRow.style.display = 'none';
  btnLabel.textContent = 'Start Segmentation';
  document.getElementById('btnIcon').innerHTML = '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>';
  setStatus('READY', '0,168,132');
  fileInput.value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Show result buttons ──
function showResultActions() {
  segBtn.style.display = 'none';
  actionRow.style.display = 'flex';
}

// ── Button listeners ──
segBtn.addEventListener('click', runSegmentation);
retryBtn.addEventListener('click', runSegmentation);
newImageBtn.addEventListener('click', resetToUpload);
changeImgBtn.addEventListener('click', () => { fileInput.click(); });

// ── New image ──
document.addEventListener('click', e => {
  if (e.target === originalImg) {
    fileInput.click();
  }
});

// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Initial state ──
segBtn.disabled = true;
</script>
</body>
